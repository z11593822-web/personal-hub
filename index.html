<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Миний Сургалтын Төв</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 20px; color: #333; }
        h1 { color: #2c3e50; text-align: center; }
        .container { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 45%; box-sizing: border-box; }
        .full-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 92%; box-sizing: border-box; margin: 20px auto 0 auto; }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 10px; color: #2980b9; margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .li-content { display: flex; align-items: center; }
        input[type="checkbox"] { margin-right: 10px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #3498db; color: white; }
        
        /* Оролтын талбаруудын загвар */
        .input-group { margin-top: 15px; display: flex; gap: 5px; flex-wrap: wrap; }
        input[type="text"], textarea { border: 1px solid #ccc; border-radius: 4px; padding: 6px 10px; font-family: inherit; font-size: 14px; }
        .input-group input[type="text"] { flex: 1; min-width: 80px; }
        textarea { width: 100%; height: 120px; resize: vertical; box-sizing: border-box; background-color: #fff9db; }
        
        /* Товчлууруудын загвар */
        button { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn { background-color: #3498db; color: white; }
        .add-btn:hover { background-color: #2980b9; }
        .save-btn { background-color: #2ecc71; color: white; margin-top: 5px; width: 100%; padding: 10px; font-size: 15px; }
        .save-btn:hover { background-color: #27ae60; }
        .delete-btn { background: none; color: #e74c3c; font-size: 16px; padding: 0 5px; }
        .delete-btn:hover { color: #c0392b; }
    </style>
</head>
<body>

    <h1>📚 Миний Хувийн Сурлагын Төв</h1>

    <div class="container">
        <div class="box">
            <h2>📅 Өдөрт хийх зүйлс</h2>
            <ul id="todoList"></ul>
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="Шинэ төлөвлөгөө бичих...">
                <button class="add-btn" onclick="addTodo()">Нэмэх</button>
            </div>
        </div>

        <div class="box">
            <h2>🇰🇷 Солонгос хэл - Шинэ үгс</h2>
            <table id="wordTable">
                <thead>
                    <tr>
                        <th>Гадаад үг</th>
                        <th>Орчуулга</th>
                        <th>Тэмдэглэл</th>
                        <th>Үйлдэл</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="input-group">
                <input type="text" id="wordKr" placeholder="Үг (공부하다)">
                <input type="text" id="wordMn" placeholder="Орчуулга">
                <input type="text" id="wordNote" placeholder="Тэмдэглэл">
                <button class="add-btn" onclick="addWord()">Нэмэх</button>
            </div>
        </div>
    </div>
